---
layout: default
---
<div class="page-shell{% if page.wide %} page-shell-wide{% endif %}">
  <section class="page-panel post">
    <header class="post-header">
      <h1 class="h2">{{ page.title }}</h1>
    </header>
    <article class="post-content{% if page.wide %} post-content-wide{% endif %}">
    {{ content }}
    </article>
  </section>
</div>
