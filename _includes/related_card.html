<article class="related-card">
  {% if include.post.image %}
  <a class="post-card-media related-card-media" href="{{ include.post.url | relative_url }}" aria-label="{{ include.post.title | xml_escape }}">
    <img src="{{ include.post.image | relative_url }}" alt="{{ include.post.image_alt | default: include.post.title | xml_escape }}" loading="lazy">
  </a>
  {% endif %}
  <p class="post-meta">{{ include.post.date | date: site.date_format }}</p>
  <h3><a href="{{ include.post.url | relative_url }}" class="post-link">{{ include.post.title }}</a></h3>
  <p class="post-summary">{{ include.post.summary | default: include.post.excerpt | strip_html | truncate: 150 }}</p>
</article>
