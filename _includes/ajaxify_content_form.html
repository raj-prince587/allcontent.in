<script>
  (function () {
    var contactForm = document.querySelector('.contact-form');
    if (!contactForm) return;

    var sendButton = contactForm.querySelector('button[type="submit"]');
    var statusNode = contactForm.querySelector('.form-status');

    contactForm.addEventListener('submit', function (event) {
      event.preventDefault();

      if (!contactForm.checkValidity()) {
        contactForm.reportValidity();
        return;
      }

      sendButton.disabled = true;
      sendButton.textContent = {{ site.text.contact.ajax.sending | jsonify }};
      statusNode.textContent = '';

      var formData = new FormData(contactForm);

      fetch(contactForm.action, {
        method: 'POST',
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      }).then(function (response) {
        if (!response.ok) {
          throw new Error('Request failed');
        }

        contactForm.reset();
        statusNode.textContent = {{ site.text.contact.ajax.sent | jsonify }};
        sendButton.textContent = {{ site.text.contact.submit | jsonify }};
        sendButton.disabled = false;
      }).catch(function () {
        statusNode.textContent = {{ site.text.contact.ajax.error | jsonify }};
        sendButton.textContent = {{ site.text.contact.submit | jsonify }};
        sendButton.disabled = false;
      });
    });
  })();
</script>
