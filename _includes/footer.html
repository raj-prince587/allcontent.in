<footer class="site-footer">
  <div class="measure footer-grid">
    <div>
      <p class="footer-heading">{{ site.title }}</p>
      <p>{{ site.description }}</p>
    </div>
    <div>
      <p class="footer-heading">Explore</p>
      <p><a href="{{ '/archive/' | relative_url }}">Archive</a> · <a href="{{ '/topics/' | relative_url }}">Topics</a> · <a href="{{ '/search/' | relative_url }}">Search</a></p>
    </div>
    <div>
      <p class="footer-heading">Contact</p>
      <p><a href="{{ '/contact/' | relative_url }}">Start a conversation</a></p>
    </div>
  </div>
  <div class="measure footer-meta">
    <small>Copyright © {{ 'now' | date: '%Y' }} {{ site.title }}. All rights reserved.</small>
  </div>
</footer>
{% if site.enable_anchorjs %}<!-- AnchorJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/3.0.0/anchor.min.js"></script>
<script>
  anchors.options.visible = 'always';
  anchors.add('article h2, article h3, article h4, article h5, article h6');
</script>{% endif %}
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("{{ '/sw.js' | relative_url }}");
  }
</script>
<script>
  (function () {
    var button = document.querySelector('.theme-toggle');
    var root = document.documentElement;
    var storageKey = 'site-theme';
    var darkQuery = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;

    function systemTheme() {
      return darkQuery && darkQuery.matches ? 'dark' : 'light';
    }

    function currentTheme() {
      return root.getAttribute('data-theme') || systemTheme();
    }

    function updateButton(theme) {
      if (!button) return;
      var isDark = theme === 'dark';
      button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
      button.setAttribute('aria-label', isDark ? 'Switch to light theme' : 'Switch to dark theme');
      button.title = isDark ? 'Switch to light theme' : 'Switch to dark theme';
    }

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      updateButton(theme);
    }

    updateButton(currentTheme());

    if (button) {
      button.addEventListener('click', function () {
        var nextTheme = currentTheme() === 'dark' ? 'light' : 'dark';
        try {
          localStorage.setItem(storageKey, nextTheme);
        } catch (error) {}
        applyTheme(nextTheme);
      });
    }

    if (darkQuery && darkQuery.addEventListener) {
      darkQuery.addEventListener('change', function () {
        if (!root.getAttribute('data-theme')) {
          updateButton(systemTheme());
        }
      });
    }
  })();
</script>
