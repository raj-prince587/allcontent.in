---
layout: page
title: Contact
permalink: /contact/
tags: contact
---

<div class="page-intro">
  <p>{{ site.contact_intro }}</p>
</div>

<div class="page-shell">
<div class="contact-card py2">
  {% if site.ajaxify_contact_form %}
    <form class="form-stacked contact-form" action="{{ site.formspree_endpoint }}" method="POST" novalidate>
      <label for="contact-name">
        Name
        <input id="contact-name" type="text" name="name" class="field-light" placeholder="{{ site.text.contact.name }}" required>
      </label>

      <label for="contact-email">
        Email
        <input id="contact-email" type="email" name="email" class="field-light" placeholder="{{ site.text.contact.email }}" required autocomplete="email">
      </label>

      <label for="contact-content">
        Message
        <textarea id="contact-content" name="message" class="field-light" rows="6" placeholder="{{ site.text.contact.content }}" style="resize: vertical" required></textarea>
      </label>

      <input type="hidden" name="_subject" value="{{ site.text.contact.subject | default: 'New submission!' }}">
      <input type="text" name="_gotcha" class="visually-hidden" tabindex="-1" autocomplete="off">

      <button type="submit" class="button button-blue button-big mobile-block">{{ site.text.contact.submit }}</button>
      <p class="form-status" aria-live="polite"></p>
    </form>
  {% else %}
    <form action="{{ site.formspree_endpoint }}" method="POST" class="form-stacked contact-form">
      <label for="contact-name-fallback">
        Name
        <input id="contact-name-fallback" type="text" name="name" class="field-light" placeholder="{{ site.text.contact.name }}" required>
      </label>
      <label for="contact-email-fallback">
        Email
        <input id="contact-email-fallback" type="email" name="email" class="field-light" placeholder="{{ site.text.contact.email }}" required autocomplete="email">
      </label>
      <label for="contact-content-fallback">
        Message
        <textarea id="contact-content-fallback" name="message" class="field-light" rows="6" placeholder="{{ site.text.contact.content }}" style="resize: vertical" required></textarea>
      </label>

      <input type="hidden" name="_next" value="{{ '/thanks/' | absolute_url }}">
      <input type="hidden" name="_subject" value="{{ site.text.contact.subject | default: 'New submission!' }}">
      <input type="text" name="_gotcha" class="visually-hidden" tabindex="-1" autocomplete="off">

      <input type="submit" class="button button-blue button-big mobile-block" value="{{ site.text.contact.submit }}">
    </form>
  {% endif %}
</div>
</div>

{% if site.ajaxify_contact_form %}
  {% include ajaxify_content_form.html %}
{% endif %}
