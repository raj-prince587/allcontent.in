---
layout: page
title: Search
permalink: /search/
---

<div class="page-intro">
  <p>Search the article library by title, summary, category, or tag.</p>
</div>

<div class="page-shell">
  <div class="search-shell">
    <label for="site-search" class="search-label">{{ site.text.search.title }}</label>
    <input id="site-search" class="field-light search-input" type="search" placeholder="Search articles">
    <p id="search-status" class="post-meta" aria-live="polite">{{ site.text.search.empty }}</p>
    <div id="search-results" class="post-grid"></div>
  </div>
</div>

<script>
(function () {
  var input = document.getElementById('site-search');
  var results = document.getElementById('search-results');
  var status = document.getElementById('search-status');
  var emptyMessage = {{ site.text.search.empty | jsonify }};
  var noneMessage = {{ site.text.search.none | jsonify }};
  var featuredLabel = {{ site.text.post.featured | jsonify }};

  function safePath(value) {
    return typeof value === 'string' && value.charAt(0) === '/' ? value : '#';
  }

  function clearResults() {
    while (results.firstChild) {
      results.removeChild(results.firstChild);
    }
  }

  function appendTextElement(parent, tagName, className, text) {
    var element = document.createElement(tagName);
    if (className) {
      element.className = className;
    }
    element.textContent = text || '';
    parent.appendChild(element);
    return element;
  }

  function render(items) {
    clearResults();

    if (!items.length) {
      status.textContent = noneMessage;
      return;
    }

    status.textContent = items.length + ' result' + (items.length === 1 ? '' : 's');

    items.forEach(function (item) {
      var article = document.createElement('article');
      article.className = 'post-card';

      if (item.featured) {
        appendTextElement(article, 'p', 'featured-badge', featuredLabel);
      }

      if (item.category) {
        var categoryWrapper = document.createElement('p');
        var categoryLink = document.createElement('a');
        categoryLink.className = 'eyebrow';
        categoryLink.href = safePath(item.categoryUrl);
        categoryLink.textContent = item.category;
        categoryWrapper.appendChild(categoryLink);
        article.appendChild(categoryWrapper);
      }

      appendTextElement(article, 'p', 'post-meta', item.date);

      var heading = document.createElement('h3');
      var link = document.createElement('a');
      link.href = safePath(item.url);
      link.textContent = item.title || '';
      heading.appendChild(link);
      article.appendChild(heading);

      appendTextElement(article, 'p', 'post-summary', item.summary);
      results.appendChild(article);
    });
  }

  function debounce(fn, wait) {
    var timeout;
    return function () {
      var ctx = this, args = arguments;
      clearTimeout(timeout);
      timeout = setTimeout(function () { fn.apply(ctx, args); }, wait);
    };
  }

  function loadScript(src, cb) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = cb;
    s.onerror = cb;
    document.head.appendChild(s);
  }

  fetch('{{ "/search.json" | relative_url }}')
    .then(function (response) {
      if (!response.ok) {
        throw new Error('Search index request failed');
      }
      return response.json();
    })
    .then(function (data) {
      // load Fuse.js for fuzzy matching then wire up input with debounce
      loadScript('https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js', function () {
        try {
          var fuse = new Fuse(data, {
            keys: ['title', 'summary', 'category', 'searchable'],
            threshold: 0.4,
            ignoreLocation: true,
            includeScore: true
          });

          var onInput = debounce(function () {
            var q = input.value.trim();
            if (!q) {
              clearResults();
              status.textContent = emptyMessage;
              return;
            }

            var fuseResults = fuse.search(q, { limit: 50 });
            var items = fuseResults.map(function (r) { return r.item; });
            render(items);
          }, 300);

          input.addEventListener('input', onInput);
          input.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') { input.value = ''; clearResults(); status.textContent = emptyMessage; }
          });
        } catch (err) {
          // fallback to simple substring filter
          input.addEventListener('input', debounce(function () {
            var q = input.value.trim().toLowerCase();
            if (!q) { clearResults(); status.textContent = emptyMessage; return; }
            var matches = data.filter(function (item) { return item.searchable.indexOf(q) !== -1; });
            render(matches);
          }, 300));
        }
      });
    })
    .catch(function () {
      status.textContent = 'Search is temporarily unavailable.';
    });
})();
</script>
