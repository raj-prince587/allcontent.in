# Site settings
title:       All Content
email:       info@allcontent.in
author:      Digital Team
author_type: Organization
description: "Discover Endless Content Options with allcontent.in"
baseurl:     ""
url:         "https://allcontent.in"
lang:        "en"
date_format: "%b %-d, %Y"
header_pages:
 - about.md

tagline: "Actionable eCommerce, technology, and web operations insights."
focus_categories:
  - Technology
  - eCommerce
  - Education
header_category_links:
  - title: Technology
    url: /category/Technology
  - title: eCommerce
    url: /category/eCommerce
  - title: Education
    url: /category/Education
author_role: "Technology and eCommerce Editorial Team"
author_bio: "Publishes practical implementation notes on technology, eCommerce platforms, infrastructure issues, and digital operations for teams that need reliable execution."
author_location: "India"
contact_intro: "Use the contact form for consulting, implementation, and technical collaboration inquiries."
formspree_endpoint: "https://formspree.io/info@allcontent.in"
brand_image: "/splash-512x512.png"
featured_categories:
  - Technology
  - eCommerce
  - Education
  - Magento

# Google services
google_verification:
# Use either direct GA implementation or set up GTM account
# - using both will skew your data (leave blank to not use at all)
google_analytics:
google_tag_manager: GTM-P95XS3B3
# Bing services
bing_verification:

# Optional features
animated:             false
show_related_posts:   true
show_post_footers:    true
show_social_icons:    true
ajaxify_contact_form: true
enable_mathjax: false
extended_fonts: false
enable_anchorjs: true
# Preview image for social media aka og:image and twitter:image
post_preview_image: true

# Facebook Page integration
# (for instant articles and other stuff)
fb_page: false
fb_page_id:

# Disqus post comments
# (leave blank to disable Disqus)
disqus_shortname:

# Facebook Comments plugin
# (leave blank to disable Facebook Comments, otherwise set it to true)
facebook_comments:
facebook_appid:
facebook_comments_number: 10

# Social icons
github_username:
reddit_username:
bitbucket_username:
stackoverflow_id:
twitter_username:
skype_username:
steam_nickname:
google_plus_id:
linkedin_username:
angellist_username:
medium_id:
bitcoin_url:
paypal_url:
flattr_button:
telegram_username:
vk_id:

# Post sharing icons
show_sharing_icons: true
share_copy_link: true
share_x: true
share_linkedin: true
share_whatsapp: true

text:
  pagination:
    newer: 'Newer'
    older: 'Older'
  share_buttons:
    text:         'Share this article'
    copy:         'Copy link'
    copied:       'Link copied.'
    copy_error:   'Copy failed. Use the address bar instead.'
    x:            'Share on X'
    linkedin:     'Share on LinkedIn'
    whatsapp:     'Share on WhatsApp'
  post:
    updated:        'Updated'
    reviewed:       'Last reviewed'
    on_this_page:   'ON THIS PAGE'
    bookmark_page:  'Bookmark'
    bookmark_hint:  'Press Ctrl+D to bookmark this page.'
    bookmark_hint_mac: 'Press Command+D to bookmark this page.'
    copy_page_link: 'Copy link'
    minute_read:    'minute read'
    related_posts:  'Related Posts'
    featured:       'Featured Article'
  index:
    coming_soon: 'Coming soon...'
    latest: 'Latest Articles'
    featured: 'Featured Insight'
  contact:
    email:    'Email Address'
    name:     'Full Name'
    content:  'How can we help?'
    subject:  'New submission!'
    submit:   'Send Message'
    ajax:
      sending:  'Sending...'
      sent:     'Message sent!'
      error:    'There was a problem. Please try again.'
  search:
    title: 'Search Articles'
    empty: 'Start typing to search the archive.'
    none: 'No matching articles found.'
  thanks: 'Thanks for contacting us. We will reply as soon as possible.'
  og_locale: 'en_US'

# Build settings
markdown:     kramdown
redcarpet:
  extensions: ['smart', 'tables', 'with_toc_data']
permalink:    pretty
paginate:     4
category_path: category
category_layout: category_index.html
sass:
  style: compressed
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-category-pages
# https://github.com/jekyll/jekyll/issues/2938
exclude:
  - .bundle
  - .github
  - .gitignore
  - .sass-cache
  - .travis.yml
  - appveyor.yml
  - bin
  - Gemfile
  - Gemfile.lock
  - LICENSE.txt
  - Rakefile
  - README.md
  - screenshot.png
  - vendor
