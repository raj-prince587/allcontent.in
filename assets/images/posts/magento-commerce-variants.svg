<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Commerce Platform Variants Visual</title>
  <desc id="desc">Four connected commerce platform models comparing open source, on-premises, cloud, and SaaS.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#f2f3ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f8fc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="92" y="112" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="900" fill="#031b4e">Commerce platform operating models</text>
  <text x="94" y="158" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="650" fill="#5c6f97">Ownership, infrastructure, and customization tradeoffs</text>
  <path d="M206 348h788" stroke="#b9c9dd" stroke-width="8" stroke-linecap="round"/>
  <circle cx="206" cy="348" r="18" fill="#0a4fd6"/>
  <circle cx="468" cy="348" r="18" fill="#12c7b7"/>
  <circle cx="730" cy="348" r="18" fill="#ffcf5a"/>
  <circle cx="994" cy="348" r="18" fill="#f95020"/>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="106" y="222" width="200" height="210" rx="24" fill="url(#card)" stroke="#d7e1f1" stroke-width="3"/>
    <text x="136" y="282" font-size="23" font-weight="900" fill="#031b4e">Open Source</text>
    <text x="136" y="326" font-size="18" font-weight="700" fill="#5c6f97">Merchant-owned</text>
    <text x="136" y="380" font-size="16" fill="#5c6f97">Maximum control</text>
    <rect x="368" y="222" width="200" height="210" rx="24" fill="url(#card)" stroke="#d7e1f1" stroke-width="3"/>
    <text x="398" y="282" font-size="23" font-weight="900" fill="#031b4e">On-Prem</text>
    <text x="398" y="326" font-size="18" font-weight="700" fill="#5c6f97">Licensed stack</text>
    <text x="398" y="380" font-size="16" fill="#5c6f97">Enterprise features</text>
    <rect x="630" y="222" width="200" height="210" rx="24" fill="url(#card)" stroke="#d7e1f1" stroke-width="3"/>
    <text x="660" y="282" font-size="23" font-weight="900" fill="#031b4e">Cloud PaaS</text>
    <text x="660" y="326" font-size="18" font-weight="700" fill="#5c6f97">Managed infra</text>
    <text x="660" y="380" font-size="16" fill="#5c6f97">App ownership</text>
    <rect x="894" y="222" width="200" height="210" rx="24" fill="url(#card)" stroke="#d7e1f1" stroke-width="3"/>
    <text x="924" y="282" font-size="23" font-weight="900" fill="#031b4e">SaaS</text>
    <text x="924" y="326" font-size="18" font-weight="700" fill="#5c6f97">Managed service</text>
    <text x="924" y="380" font-size="16" fill="#5c6f97">App Builder</text>
  </g>
  <rect x="250" y="506" width="700" height="56" rx="28" fill="#103a2b"/>
  <text x="324" y="543" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" fill="#ffffff">More control</text>
  <path d="M494 534h212" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <path d="M688 516l24 18-24 18" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="744" y="543" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" fill="#ffffff">More managed</text>
</svg>
